<html>
<head>
<meta charset="UTF8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNIC Location Tracker</title>

<style>
    body {
        background-color:#161b22;
        font-family: Arial, sans-serif;
    }

    a { color:#6c57ff; text-decoration:none; }
    a:hover { text-decoration:underline; }

    p { color:white; }

    footer {
        margin-top: 40px;
        padding: 15px;
        color: #aaa;
        font-size: 14px;
        border-top: 1px solid #333;
    }

    .error-box {
        color: #ff4d4d;
        font-weight: bold;
        animation: shake 0.3s ease-in-out;
    }

    .warn-box {
        color: #ffd24d;
        font-weight: bold;
    }

    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        50% { transform: translateX(3px); }
        75% { transform: translateX(-3px); }
        100% { transform: translateX(0); }
    }

    input {
        width: 330px;
        padding: 10px;
        border-radius: 5px;
        border: none;
        outline: none;
    }
</style>

<script>
function error(msg) {
    document.getElementById("error").innerHTML = msg;
    document.getElementById("error").className = "error-box";
}

function warn(msg) {
    document.getElementById("warn").innerHTML = msg;
    document.getElementById("warn").className = "warn-box";
}

function setLetterCase(characters) {
    var refined = "";
    var comma = characters.split(',');
    for (var c = 0; c < comma.length; c++) {
        var space = comma[c].split(' ');
        if (space[0].length > 0) {
            for (var s = 0; s < space.length; s++)
                refined += " " + space[s].charAt(0).toUpperCase() + space[s].substring(1).toLowerCase();
            refined += ",";
        }
    }
    return refined;
}

function clear() {
    error("");
    warn("");
    document.getElementById("Gender").innerHTML = "Gender: ";
    document.getElementById("Location").innerHTML = "Residence: ";
}

function trackLocation() {
    clear();
    var cnic = document.getElementById("cnic");
    var val = cnic.value.trim();

    if (val.length != 15) {
        warn("Example: 12345-6789012-3");
        return error("CNIC should be 15 digits including dashes");
    }

    document.getElementById("Gender").innerHTML = "Gender: " + gender(val);
    document.getElementById("Location").innerHTML = "Residence: " + setLetterCase(locate(val));
}

function gender(cnic) {
    return (cnic.slice(-1) % 2 == 0 ? "Female" : "Male");
}
</script>

</head>

<body>

<center>

    <p>Enter CNIC below to find location and gender</p>

    <input 
        id="cnic" 
        oninput="trackLocation()" 
        placeholder="Enter CNIC like 15602-7730609-7"
    />

    <p id="error"></p>
    <p id="warn"></p>

    <p id="Location" style="color:#13d913">Residence: </p>
    <p id="Gender" style="color:#23f9d0">Gender:</p>

    <br/>

    <a href="https://whatsapp.com/channel/0029Vb5isALI1rcah6CRXm3J" target="_blank">
        Report Errors / Join ERRORX Channel
    </a>

</center>

<footer>

        <p>Made by <b>Abdullah Suleman (TWILIGHT)</b></p>

            Join ERRORX Channel
        </a>
    </center>
</footer>

</body>
</html>
